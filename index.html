<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a12">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>NEON SNAKE</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐍</text></svg>">
  <script type="module" crossorigin src="./assets/index-qAYBCnik.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/index-lLHQ-Kyb.css">
</head>
<body>
  <div id="app">
    <canvas id="game-canvas"></canvas>

    <!-- In-game menu button (hamburger, top-left during gameplay) -->
    <button id="btn-game-menu" class="game-menu-btn hidden" title="Menu (ESC)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>

    <!-- In-game pause/menu overlay -->
    <div id="pause-menu" class="screen-overlay hidden">
      <h2 class="pause-title">PAUSED</h2>
      <p id="pause-level-info" class="pause-info"></p>
      <button id="btn-resume" class="btn btn-primary">
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="5 3 19 12 5 21 5 3"/>
        </svg>
        Resume
      </button>
      <button id="btn-restart" class="btn">
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
        Restart Level
      </button>
      <button id="btn-quit-to-levels" class="btn">
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
        </svg>
        Level Select
      </button>
      <button id="btn-quit-to-title" class="btn">
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Quit to Title
      </button>
    </div>

    <!-- Game Over overlay -->
    <div id="gameover-screen" class="screen-overlay hidden">
      <h2 class="gameover-title">GAME OVER</h2>
      <p id="gameover-score" class="gameover-score"></p>
      <p id="gameover-message" class="gameover-message"></p>
      <button id="btn-retry" class="btn btn-primary">
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
        Try Again
      </button>
      <button id="btn-gameover-levels" class="btn">Level Select</button>
      <button id="btn-gameover-title" class="btn">Quit to Title</button>
    </div>

    <!-- User bar (shown when logged in) -->
    <div id="user-bar" class="user-bar hidden"></div>

    <!-- Title Screen -->
    <div id="title-screen" class="screen-overlay">
      <div class="title-snake-art">
        <div class="snake-emoji-anim">&#x1F40D;</div>
      </div>
      <h1 class="game-title">NEON SNAKE</h1>
      <p class="game-subtitle">A level-based arcade experience</p>

      <button id="btn-play-guest" class="btn btn-primary">
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="5 3 19 12 5 21 5 3"/>
        </svg>
        Play as Guest
      </button>

      <div id="auth-section">
        <div class="auth-divider">OR SIGN IN TO SYNC PROGRESS</div>

        <button id="btn-google" class="btn btn-google">
          <svg class="btn-icon" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Continue with Google
        </button>

        <button id="btn-apple" class="btn btn-apple">
          <svg class="btn-icon" viewBox="0 0 24 24">
            <path fill="#fff" d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.4C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/>
          </svg>
          Continue with Apple
        </button>
      </div>

      <p class="title-hint">Controls: Arrow keys or WASD &bull; ESC to pause &bull; Enter to select</p>
    </div>

    <!-- Track Select Screen -->
    <div id="track-screen" class="screen-overlay hidden">
      <h2 class="track-select-title">SELECT TRACK</h2>
      <p class="track-subtitle">Choose your challenge</p>
      <div id="track-grid" class="track-grid"></div>
      <button id="btn-back-title-from-tracks" class="btn btn-back">
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
        </svg>
        Back to Title
      </button>
    </div>

    <!-- Swarm Config Modal -->
    <div id="swarm-config" class="screen-overlay hidden">
      <h2 class="swarm-config-title">SWARM CONFIG</h2>
      <p class="swarm-config-subtitle" id="swarm-level-name"></p>
      <div class="swarm-slider-wrap">
        <label class="swarm-label">ENEMY SNAKES</label>
        <div class="swarm-slider-row">
          <input type="range" id="swarm-count" class="swarm-slider" min="1" max="100" value="5">
          <span id="swarm-count-val" class="swarm-count-val">5</span>
        </div>
        <div class="swarm-range-hints">
          <span>1</span><span>Chill</span><span>Chaos</span><span>100</span>
        </div>
      </div>
      <button id="btn-swarm-start" class="btn btn-primary">START</button>
      <button id="btn-swarm-back" class="btn btn-back">
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
        </svg>
        Back
      </button>
    </div>

    <!-- Level Select Screen -->
    <div id="level-screen" class="screen-overlay hidden">
      <h2 id="level-screen-title" class="level-select-title">SELECT LEVEL</h2>
      <p id="level-description" class="level-description"></p>
      <div id="level-grid" class="level-grid"></div>
      <button id="btn-back-tracks" class="btn btn-back">
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
        </svg>
        Back to Tracks
      </button>
    </div>
  </div>

</body>
</html>
